name: 8591/591 新品偵測

# ──────────────────────────────────────────────
# 觸發方式
#   1) schedule：依 cron 自動跑（時間是 UTC，見下方說明）
#   2) workflow_dispatch：在 GitHub 網頁上手動按「Run workflow」
#      → 第一次部署完，先用這個手動跑一次，驗證從 GitHub 的 IP 抓不抓得到資料
# ──────────────────────────────────────────────
on:
  workflow_dispatch:
  schedule:
    # ── 全天候監測（24 小時，每 5 分鐘）+ 錯開整點 ──
    # GitHub 排程在「整點」最壅塞，最容易被延遲或整批跳過。
    # 因此不用 */5（會落在 0,5,10… 的整點），改成偏移 +3 分（3,8,13…），避開尖峰瞬間。
    # 小時用 *（所有 UTC 小時 = 台灣全天 24 小時都跑），早上就不必依賴
    # 「09:00 那一班剛排進最擠時刻」的觸發；清晨的班次會讓當天第一筆偵測更快補上。
    # 仍須知道：GitHub 不保證準時，個別班次可能延遲十幾分鐘、偶爾被丟，這是平台限制。
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

# 同一時間只允許一個執行，避免兩次重疊導致狀態檔衝突
concurrency:
  group: monitor
  cancel-in-progress: false

# 需要寫入權限，才能把更新後的 last_product_ids.json commit 回 repo
permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝依賴
        run: pip install -r requirements.txt

      - name: 執行單次偵測
        env:
          # Discord webhook 來自 repo 的 Secret（不會出現在程式碼裡）
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor_once.py

      - name: 將狀態檔 last_product_ids.json 存回 repo
        # always()：即使前一步抓取部分失敗，也把已更新的 baseline 存回
        if: always()
        run: |
          git config user.name  "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"

          if git diff --quiet -- last_product_ids.json; then
            echo "狀態檔沒有變化，不需要 commit。"
            exit 0
          fi

          # ── 防衝突的回推策略（last-writer-wins）──
          # 不用 rebase（兩邊都改同一個 JSON 會衝突、卡 detached HEAD）。
          # 改成：先保存「本次算好的狀態」，同步到最新遠端後直接覆蓋再 push，
          # 永遠是乾淨地疊在 origin/main 之上，不會有合併衝突。
          # 失敗時自動重試幾次，吸收偶發的並行推送。
          cp last_product_ids.json /tmp/state.json
          for i in 1 2 3; do
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/state.json last_product_ids.json
            git add last_product_ids.json
            git diff --cached --quiet && { echo "與遠端一致，無需提交。"; exit 0; }
            git commit -m "chore: update last_product_ids.json [skip ci]"
            if git push origin main; then
              echo "已將更新後的狀態檔推回 repo。"
              exit 0
            fi
            echo "推送被搶先（第 $i 次），重新同步後重試..."
            sleep 3
          done
          echo "⚠️ 連續重試後仍無法推送狀態檔；本次偵測通知已送出，下次執行會重新建立 baseline。"
